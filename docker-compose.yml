services:
  feature-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      FEATURE_MATRIX_DATA_DIR: /app/data
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD를 .env 파일에 설정하세요}
      EDITOR_PASSWORD: ${EDITOR_PASSWORD:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
