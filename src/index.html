<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>featureMATRIX 기능정의 툴</title>
<link rel="stylesheet" href="fonts/noto-sans-kr.css">
<link rel="stylesheet" href="style.css">
<!-- #5 KaTeX (수식 렌더링) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
/* ── 벌크 선택 바 ── */
.bulk-bar{display:flex;align-items:center;padding:6px 14px;background:var(--accent-l);border-bottom:1px solid var(--accent);gap:6px;flex-wrap:wrap;font-size:.8rem;color:var(--text)}
tr.bulk-selected>td{background:var(--accent-l) !important}
/* ── 셀 퀵 입력 ── */
.cell-quick-wrap{margin-top:4px}
.cell-quick-inp{width:100%;border:1px dashed var(--border-2);border-radius:5px;padding:4px 7px;font-size:.72rem;background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:all .15s}
.cell-quick-inp:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 2px var(--accent-l)}
.cell-quick-inp::placeholder{color:var(--text-3)}
.admin-locked{opacity:.45;pointer-events:none;filter:grayscale(.3)}
[data-admin].admin-locked{cursor:not-allowed;pointer-events:auto}
[data-admin].admin-locked:hover::after{content:'🔒 관리자 전용';position:fixed;background:var(--surface);border:1px solid var(--border-2);border-radius:5px;padding:3px 8px;font-size:.72rem;color:var(--text-2);z-index:9999;white-space:nowrap}
</style>
<style id="dynStyle"></style>
</head>
<body>
<div id="root"></div>
<script type="module" src="app/main.js"></script>
</body>
</html>
