name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release 생성에 필요
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "빌드 버전: $VERSION"

      # git tag push 시 VERSION 파일과 태그 일치 여부 검증
      - name: Verify tag matches VERSION file
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(cat VERSION)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ 태그($TAG)와 VERSION 파일($VERSION)이 불일치합니다."
            echo "   git tag와 VERSION 파일을 동일한 값으로 맞춰주세요."
            exit 1
          fi
          echo "✅ 태그($TAG) == VERSION($VERSION) 일치 확인"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # git tag v1.2.3 push → 1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_RUN_NUMBER=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # git tag push 시에만 GitHub Release 자동 생성
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true   # 이전 릴리즈 이후 커밋을 자동으로 릴리즈 노트로 생성
          make_latest: true
