# 로컬 개발용 - 소스코드에서 직접 빌드
# 사용법: docker compose -f docker-compose.dev.yml up -d --build

services:
  feature-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      FEATURE_MATRIX_DATA_DIR: /app/data
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD를 .env 파일에 설정하세요}
      EDITOR_PASSWORD: ${EDITOR_PASSWORD:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
